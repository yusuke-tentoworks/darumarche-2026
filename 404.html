<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found | だるまルシェ 2026</title>
    <link rel="icon" href="assets/images/favicon.webp" type="image/webp">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Zen+Old+Mincho:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .error-page {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            background-color: var(--color-bg);
        }
        .error-content h1 {
            font-size: 6rem;
            color: var(--color-primary);
            line-height: 1;
            margin-bottom: 1rem;
        }
        .error-content h2 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
        }
        .btn-home {
            display: inline-block;
            padding: 1rem 2.5rem;
            background-color: var(--color-primary);
            color: #fff;
            border-radius: 50px;
            font-weight: 700;
            text-decoration: none;
            transition: opacity 0.3s;
        }
        .btn-home:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="error-page">
        <div class="error-content">
            <h1>404</h1>
            <h2>ページが見つかりませんでした</h2>
            <p style="margin-bottom: 3rem;">お探しのページは移動または削除された可能性があります。</p>
            <a href="index.html" class="btn-home">TOPページへ戻る</a>
        </div>
    </div>
</body>
</html>
